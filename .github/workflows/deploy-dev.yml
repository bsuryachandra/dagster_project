name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install python3-pip python3-venv git -y

      - name: Create virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install Python packages
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install dagster==1.12.4 dagster-dg-cli dagster-webserver
          pip install -r requirements.txt

      - name: Check Python version
        run: |
          source venv/bin/activate
          mkdir -p ~/dagster_home
          python --version
          dagster --version
          pip install -e .
          dg check defs

      - name: Start Dagster Daemon
        run: |
          source venv/bin/activate
          export DAGSTER_HOME=~/dagster_home
          dagster-daemon run &                    # ← & runs it in background
          echo $! > /tmp/dagster-daemon.pid       # ← save process ID
          sleep 10                                # ← wait for daemon to start

      - name: Check Daemon is healthy
        run: |
          source venv/bin/activate
          dagster-daemon health-check             # ← check daemon is running ok

      - name: Start Dagster Webserver
        run: |
          source venv/bin/activate
          export DAGSTER_HOME=~/dagster_home
          dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml &
          echo $! > /tmp/dagster-webserver.pid
          sleep 10                                # ← wait for webserver to start

      - name: Check Webserver is healthy
        run: |
          curl --fail http://localhost:3000/server_info || exit 1
          echo "Webserver is up!"

      - name: Stop Daemon and Webserver
        if: always()                              # ← runs even if previous steps fail
        run: |
          kill $(cat /tmp/dagster-daemon.pid)     || true
          kill $(cat /tmp/dagster-webserver.pid)  || true
          echo "Services stopped"

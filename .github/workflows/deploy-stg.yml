name: Deploy to Stage

on:
  push:
    branches: [main]        # ← triggers only after merge to main

jobs:
  deploy-stage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Stage VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGE_VM_HOST }}
          username: ${{ secrets.STAGE_VM_USER }}
          password: ${{ secrets.STAGE_VM_PASSWORD }}
          script: |
            cd /home/kiewitdagsterdev/dagster_project
            git pull origin main
            source dagster_env/bin/activate
            pip install -r requirements.txt
            pip install -e .
            dg check defs
            sudo systemctl restart dagster-webserver
            sudo systemctl restart dagster-daemon
            systemctl is-active dagster-webserver || exit 1
            systemctl is-active dagster-daemon || exit 1
            echo "Both services are running!"
            echo "Deployment complete!"